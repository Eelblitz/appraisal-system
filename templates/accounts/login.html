<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Appraisal System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .login-header {
            background-color: #1a5276;
            color: white;
            text-align: center;
            padding: 30px 20px;
            border-radius: 12px 12px 0 0;
        }
        .login-header h4 {
            margin: 0;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }
        .login-header p {
            margin: 5px 0 0;
            font-size: 0.85rem;
            opacity: 0.85;
        }
    </style>
</head>
<body>

<div class="login-card card">
    <!-- Header -->
    <div class="login-header">
        <h4>ANNUAL PERFORMANCE EVALUATION</h4>
        <p>GEN 79 — Appraisal Management System</p>
    </div>

    <!-- Form Body -->
    <div class="card-body p-4">

        <!-- Show Django messages (errors, success, etc.) -->
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}

        <h5 class="mb-4 text-center text-muted">Sign In to Your Account</h5>

        <form method="POST" action="{% url 'accounts:login' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label for="id_username" class="form-label fw-semibold">Username</label>
                <input
                    type="text"
                    name="username"
                    id="id_username"
                    class="form-control"
                    placeholder="Enter your username"
                    required
                    autofocus
                >
            </div>

            <div class="mb-4">
                <label for="id_password" class="form-label fw-semibold">Password</label>
                <input
                    type="password"
                    name="password"
                    id="id_password"
                    class="form-control"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                Login
            </button>
        </form>

    </div>

    <div class="card-footer text-center text-muted py-3" style="font-size:0.8rem; border-radius: 0 0 12px 12px;">
        Federal Republic of Nigeria &mdash; Confidential
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
